<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読書記録 - Life OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #E8A0BF;
      --primary-light: #FFF0F5;
      --primary-dark: #957DAD;
      --primary-on: #FFFFFF;
      --text-main: #2D3B36;
      --text-sub: #7A9490;
      --bg: #fafafa;
      --bg-card: #FFFFFF;
      --accent: #957DAD;
      --border: #F0D6E4;
      --muted: #7A9490;
      --radius-card: 20px;
      --radius-btn: 14px;
      --radius-chip: 20px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
      --max-w: 480px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    button:active { transform: scale(0.97); }

    .app-wrapper {
      max-width: var(--max-w);
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: 72px;
    }

    input[type="text"],
    input[type="date"],
    textarea {
      font-family: inherit;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 8px 12px;
      background: var(--primary-light);
      color: var(--text-main);
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--primary); }

    .btn-now {
      padding: 8px 14px;
      background: var(--primary);
      color: var(--primary-on);
      border: none;
      border-radius: var(--radius-btn);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-now:active { background: var(--primary-dark); }

    .btn-submit {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius-btn);
      background: var(--primary);
      color: var(--primary-on);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.2s;
    }
    .btn-submit:active { background: var(--primary-dark); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-voice {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--bg-card);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-voice.recording {
      background: #FC8A8A;
      border-color: #FC8A8A;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Search area */
    .search-area {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .search-area .row { display: flex; gap: 8px; align-items: center; }

    /* Book list */
    .book-list { padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; }

    .book-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .book-card:hover { border-color: var(--primary); }

    .book-cover {
      width: 60px;
      height: 84px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .book-cover-placeholder {
      width: 60px;
      height: 84px;
      background: var(--primary-light);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .book-info { flex: 1; min-width: 0; }
    .book-title { font-weight: 600; font-size: 14px; word-break: break-word; }
    .book-author { font-size: 12px; color: var(--muted); }
    .stars { color: #FDD260; font-size: 14px; }
    .book-status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    /* Register form */
    .register-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-sub); }

    .medium-btns, .status-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .option-btn {
      padding: 6px 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .option-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      font-weight: 600;
    }

    .star-input { display: flex; gap: 4px; }
    .star-btn {
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s;
    }
    .star-btn.filled { color: #FDD260; }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      overflow-x: auto;
    }
    .filter-tab {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--bg-card);
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .filter-tab.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 600;
    }

    /* Pia banner */
    .books-pia-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
    }
    .books-pia-msg {
      font-size: 13px;
      color: var(--text-sub);
      background: var(--primary-light);
      padding: 8px 14px;
      border-radius: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--text-sub);
      font-size: 13px;
    }
    .empty-msg {
      text-align: center;
      padding: 12px;
      color: var(--text-sub);
      font-size: 13px;
    }

    /* Tab bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      z-index: 200;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 6px 0;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-sub);
      font-size: 10px;
      padding: 4px 12px;
      gap: 2px;
      transition: color 0.15s;
    }
    .tab-item.active { color: var(--primary-dark); }
    .tab-icon { display: flex; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sheet-link {
      display: block;
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- 検索エリア -->
  <div class="search-area">
    <div class="row">
      <input type="text" id="searchInput" placeholder="タイトルまたはISBNで検索…" autocomplete="off"
             onkeydown="if(event.key==='Enter')searchBooks()">
      <button class="btn-now" onclick="searchBooks()">検索</button>
    </div>
  </div>

  <!-- 検索結果 -->
  <div id="searchResults" class="book-list" style="display:none;"></div>

  <!-- 登録フォーム -->
  <div id="registerArea" class="book-list" style="display:none;">
    <div class="register-form">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div id="formCover"></div>
        <div style="flex:1;">
          <div style="font-weight:600;font-size:15px;" id="formTitle"></div>
          <div style="color:var(--muted);font-size:13px;" id="formAuthor"></div>
          <div style="color:var(--muted);font-size:12px;" id="formIsbn"></div>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">媒体</div>
        <div class="medium-btns">
          <button class="option-btn selected" data-medium="owned" onclick="selectMedium('owned')">📖 蔵書</button>
          <button class="option-btn" data-medium="library" onclick="selectMedium('library')">🏛 図書館</button>
          <button class="option-btn" data-medium="kindle" onclick="selectMedium('kindle')">📱 Kindle</button>
          <button class="option-btn" data-medium="audible" onclick="selectMedium('audible')">🎧 Audible</button>
          <button class="option-btn" data-medium="other" onclick="selectMedium('other')">その他</button>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">ステータス</div>
        <div class="status-btns">
          <button class="option-btn" data-status="want" onclick="selectStatus('want')">📌 読みたい</button>
          <button class="option-btn" data-status="reading" onclick="selectStatus('reading')">📖 読書中</button>
          <button class="option-btn selected" data-status="done" onclick="selectStatus('done')">✅ 読了</button>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">評価</div>
        <div class="star-input" id="starInput">
          <button class="star-btn" data-star="1" onclick="selectStar(1)">★</button>
          <button class="star-btn" data-star="2" onclick="selectStar(2)">★</button>
          <button class="star-btn" data-star="3" onclick="selectStar(3)">★</button>
          <button class="star-btn" data-star="4" onclick="selectStar(4)">★</button>
          <button class="star-btn" data-star="5" onclick="selectStar(5)">★</button>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">感想・メモ</div>
        <div style="position:relative;">
          <textarea id="noteInput" rows="3" placeholder="感想（任意）" style="width:100%;resize:vertical;font-family:inherit;font-size:14px;border:1px solid var(--border);border-radius:10px;padding:8px 12px;"></textarea>
          <button class="btn-voice" id="noteVoiceBtn" onclick="toggleNoteVoice()" title="音声入力" style="position:absolute;right:8px;top:8px;">🎤</button>
        </div>
      </div>

      <button class="btn-submit" id="registerBtn" onclick="registerBook()">📚 登録する</button>
      <button class="btn-submit" onclick="cancelRegister()" style="background:#aaa;margin-top:4px;">キャンセル</button>
    </div>
  </div>

  <!-- ピアちゃんバナー -->
  <div class="books-pia-section">
    <span style="font-size:32px;">🐾</span>
    <div class="books-pia-msg">読んだ本を記録して、<br>素敵な読書ライフを！📚</div>
  </div>

  <!-- ステータスフィルター -->
  <div class="filter-tabs" id="bookFilterTabs">
    <button class="filter-tab active" id="book-tab-all" onclick="setBookFilter('all')">すべて</button>
    <button class="filter-tab" id="book-tab-want" onclick="setBookFilter('want')">📌 読みたい</button>
    <button class="filter-tab" id="book-tab-reading" onclick="setBookFilter('reading')">📖 読書中</button>
    <button class="filter-tab" id="book-tab-done" onclick="setBookFilter('done')">✅ 読了</button>
  </div>

  <!-- 読書一覧 -->
  <div class="book-list" id="recentBooks"><div class="loading"><span class="spinner"></span> 読み込み中…</div></div>

  <a id="sheetLink" class="sheet-link" target="_blank" rel="noopener" style="display:none;">📊 スプレッドシートを開く</a>

</div>

<!-- 書籍編集モーダル -->
<div id="bookEditModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:20px;width:90%;max-width:480px;display:flex;flex-direction:column;gap:12px;max-height:85dvh;overflow-y:auto;">
    <div style="font-weight:600;font-size:15px;">読書記録を編集</div>
    <input type="hidden" id="editBookId">

    <div style="display:flex;gap:12px;align-items:flex-start;">
      <div id="editBookCover"></div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14px;" id="editBookTitle"></div>
        <div style="color:var(--muted);font-size:12px;" id="editBookAuthor"></div>
      </div>
    </div>

    <div>
      <div class="form-label">媒体</div>
      <div class="medium-btns">
        <button class="option-btn" data-edit-medium="owned" onclick="selectEditMedium('owned')">📖 蔵書</button>
        <button class="option-btn" data-edit-medium="library" onclick="selectEditMedium('library')">🏛 図書館</button>
        <button class="option-btn" data-edit-medium="kindle" onclick="selectEditMedium('kindle')">📱 Kindle</button>
        <button class="option-btn" data-edit-medium="audible" onclick="selectEditMedium('audible')">🎧 Audible</button>
        <button class="option-btn" data-edit-medium="other" onclick="selectEditMedium('other')">その他</button>
      </div>
    </div>

    <div>
      <div class="form-label">ステータス</div>
      <div class="status-btns">
        <button class="option-btn" data-edit-status="want" onclick="selectEditStatus('want')">📌 読みたい</button>
        <button class="option-btn" data-edit-status="reading" onclick="selectEditStatus('reading')">📖 読書中</button>
        <button class="option-btn" data-edit-status="done" onclick="selectEditStatus('done')">✅ 読了</button>
      </div>
    </div>

    <div>
      <div class="form-label">評価</div>
      <div class="star-input" id="editStarInput">
        <button class="star-btn" data-edit-star="1" onclick="selectEditStar(1)">★</button>
        <button class="star-btn" data-edit-star="2" onclick="selectEditStar(2)">★</button>
        <button class="star-btn" data-edit-star="3" onclick="selectEditStar(3)">★</button>
        <button class="star-btn" data-edit-star="4" onclick="selectEditStar(4)">★</button>
        <button class="star-btn" data-edit-star="5" onclick="selectEditStar(5)">★</button>
      </div>
    </div>

    <div>
      <div class="form-label">感想・メモ</div>
      <textarea id="editBookNote" rows="3"
        style="width:100%;resize:vertical;font-family:inherit;font-size:14px;border:1px solid var(--border);border-radius:10px;padding:8px 12px;"
        placeholder="感想（任意）"></textarea>
    </div>

    <div style="display:flex;gap:8px;">
      <button class="btn-submit" onclick="saveBookEdit()">保存</button>
      <button class="btn-submit" onclick="closeBookEdit()" style="background:#aaa;">キャンセル</button>
    </div>
    <button class="btn-submit" onclick="deleteBookAction()" style="background:#ff4444;margin-top:8px;font-size:12px;">この本を削除</button>
  </div>
</div>

<!-- タブバー -->
<nav class="tab-bar">
  <a href="?p=" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home
  </a>
  <a href="?p=books" class="tab-item active">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>読書
  </a>
  <a href="?p=chat" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Chat
  </a>
</nav>

<div id="toast"></div>

<script>
// ==============================
// 状態
// ==============================
var selectedBook = null;
var selectedMedium = 'owned';
var selectedStatus = 'done';
var selectedRating = 0;
var noteRecognition = null;
var isNoteRecording = false;
var currentBookFilter = 'all';
var editRating = 0;

// ==============================
// 初期化
// ==============================
document.addEventListener('DOMContentLoaded', function() {
  loadRecentBooks();
  loadSheetLink();
});

function loadSheetLink() {
  google.script.run.withSuccessHandler(function(settings) {
    var url = settings['spreadsheet_url'];
    if (url) {
      var el = document.getElementById('sheetLink');
      el.href = url;
      el.style.display = '';
    }
  }).getSettings();
}

// ==============================
// 書籍検索
// ==============================
function searchBooks() {
  var q = document.getElementById('searchInput').value.trim();
  if (!q) { showToast('検索キーワードを入力してください'); return; }

  document.getElementById('searchResults').style.display = '';
  document.getElementById('searchResults').innerHTML = '<div class="loading"><span class="spinner"></span> 検索中…</div>';
  document.getElementById('registerArea').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(data) {
      if (data.hint) {
        showToast(data.hint);
        document.getElementById('searchResults').innerHTML = '<div class="empty-msg">' + escHtml(data.hint) + '</div>';
        return;
      }
      renderSearchResults(data.books || []);
    })
    .withFailureHandler(function(e) {
      showToast('検索エラー: ' + e.message);
      document.getElementById('searchResults').innerHTML = '<div class="empty-msg">検索エラーが発生しました</div>';
    })
    .searchBook(q);
}

function renderSearchResults(books) {
  var el = document.getElementById('searchResults');
  document.getElementById('registerArea').style.display = 'none';
  el.style.display = '';

  if (!books.length) {
    el.innerHTML = '<div class="empty-msg">書籍が見つかりませんでした</div>' +
      '<div style="text-align:center;padding:8px;"><button class="btn-now" onclick="selectManual()">手動で登録する</button></div>';
    return;
  }

  el.innerHTML = books.map(function(b, i) {
    return '<div class="book-card" onclick="selectBook(' + i + ')">' +
      (b.cover_url
        ? '<img class="book-cover" src="' + b.cover_url + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="book-cover-placeholder" style="display:none;">📖</div>'
        : '<div class="book-cover-placeholder">📖</div>') +
      '<div class="book-info">' +
      '<div class="book-title">' + escHtml(b.title) + '</div>' +
      '<div class="book-author">' + escHtml(b.author) + '</div>' +
      (b.isbn ? '<div style="font-size:11px;color:var(--muted);">ISBN: ' + b.isbn + '</div>' : '') +
      '</div></div>';
  }).join('');

  window._searchResults = books;
}

function selectBook(i) {
  selectedBook = window._searchResults[i];
  showRegisterForm();
}

function selectManual() {
  selectedBook = {
    isbn: null,
    title: document.getElementById('searchInput').value,
    author: '',
    cover_url: null
  };
  showRegisterForm();
}

// ==============================
// 登録フォーム
// ==============================
function showRegisterForm() {
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('registerArea').style.display = '';

  var b = selectedBook;
  document.getElementById('formTitle').textContent = b.title;
  document.getElementById('formAuthor').textContent = b.author;
  document.getElementById('formIsbn').textContent = b.isbn ? 'ISBN: ' + b.isbn : '';

  var coverEl = document.getElementById('formCover');
  coverEl.innerHTML = b.cover_url
    ? '<img class="book-cover" src="' + b.cover_url + '" alt="">'
    : '<div class="book-cover-placeholder">📖</div>';

  selectMedium('owned');
  selectStatus('done');
  selectStar(0);
  document.getElementById('noteInput').value = '';
}

function cancelRegister() {
  selectedBook = null;
  document.getElementById('registerArea').style.display = 'none';
  document.getElementById('searchResults').style.display = '';
}

function selectMedium(m) {
  selectedMedium = m;
  document.querySelectorAll('[data-medium]').forEach(function(btn) {
    btn.classList.toggle('selected', btn.dataset.medium === m);
  });
}

function selectStatus(s) {
  selectedStatus = s;
  document.querySelectorAll('[data-status]').forEach(function(btn) {
    btn.classList.toggle('selected', btn.dataset.status === s);
  });
}

function selectStar(n) {
  selectedRating = n;
  document.querySelectorAll('.star-btn:not([data-edit-star])').forEach(function(btn) {
    btn.classList.toggle('filled', parseInt(btn.dataset.star) <= n);
  });
}

function registerBook() {
  if (!selectedBook) return;
  var note = document.getElementById('noteInput').value.trim() || null;
  var btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  google.script.run
    .withSuccessHandler(function() {
      var msg = selectedStatus === 'done' ? '読了おつかれさま〜！🎉' : '📚 登録しました！';
      showToast(msg);
      selectedBook = null;
      document.getElementById('registerArea').style.display = 'none';
      document.getElementById('searchResults').style.display = 'none';
      document.getElementById('searchInput').value = '';
      btn.disabled = false;
      btn.textContent = '📚 登録する';
      loadRecentBooks();
    })
    .withFailureHandler(function(e) {
      showToast('エラー: ' + e.message);
      btn.disabled = false;
      btn.textContent = '📚 登録する';
    })
    .saveBook({
      isbn: selectedBook.isbn,
      title: selectedBook.title,
      author: selectedBook.author,
      cover_url: selectedBook.cover_url,
      medium: selectedMedium,
      rating: selectedRating || null,
      status: selectedStatus,
      note: note
    });
}

// ==============================
// フィルター
// ==============================
function setBookFilter(status) {
  currentBookFilter = status;
  document.querySelectorAll('#bookFilterTabs .filter-tab').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('book-tab-' + status).classList.add('active');
  loadRecentBooks();
}

// ==============================
// 読書一覧
// ==============================
function loadRecentBooks() {
  document.getElementById('recentBooks').innerHTML = '<div class="loading"><span class="spinner"></span> 読み込み中…</div>';
  google.script.run
    .withSuccessHandler(function(data) {
      renderRecentBooks(data.books || []);
    })
    .withFailureHandler(function() {
      document.getElementById('recentBooks').innerHTML = '<div class="empty-msg">読み込みに失敗しました</div>';
    })
    .getRecentBooks(100, currentBookFilter);
}

function renderRecentBooks(books) {
  var el = document.getElementById('recentBooks');
  if (!books.length) {
    var msgs = {
      all: '🐾 まだ読書記録がないよ📖\n本を検索して登録しよう！',
      want: '📌「読みたい」リストがまだ空だよ',
      reading: '📖 読書中の本がないよ',
      done: '✅ まだ読了した本がないよ'
    };
    el.innerHTML = '<div class="empty-state"><p>' + (msgs[currentBookFilter] || msgs.all).replace(/\n/g, '<br>') + '</p></div>';
    return;
  }

  var statusLabel = { want: '📌 読みたい', reading: '📖 読書中', done: '✅ 読了' };
  el.innerHTML = books.map(function(b) {
    var bd = encodeURIComponent(JSON.stringify(b));
    return '<div class="book-card" style="cursor:default;">' +
      (b.cover_url
        ? '<img class="book-cover" src="' + b.cover_url + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="book-cover-placeholder" style="display:none;">📖</div>'
        : '<div class="book-cover-placeholder">📖</div>') +
      '<div class="book-info">' +
      '<div class="book-title">' + escHtml(b.title || '（タイトルなし）') + '</div>' +
      '<div class="book-author">' + escHtml(b.author || '') + '</div>' +
      (b.rating ? '<div class="stars">' + '★'.repeat(b.rating) + '☆'.repeat(5 - b.rating) + '</div>' : '') +
      '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;">' +
      '<span class="book-status-badge">' + (statusLabel[b.status] || b.status) + '</span>' +
      '<button onclick="openBookEdit(decodeURIComponent(\'' + bd + '\'))" style="font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:var(--radius-chip);background:#f5f5f5;cursor:pointer;">✏️ 編集</button>' +
      '</div>' +
      (b.note ? '<div style="font-size:12px;color:var(--muted);margin-top:4px;white-space:pre-line;">' + escHtml(String(b.note)) + '</div>' : '') +
      '</div></div>';
  }).join('');
}

// ==============================
// 編集モーダル
// ==============================
function openBookEdit(bookJson) {
  var b = JSON.parse(bookJson);
  document.getElementById('editBookId').value = b.id;
  document.getElementById('editBookTitle').textContent = b.title || '';
  document.getElementById('editBookAuthor').textContent = b.author || '';

  var coverEl = document.getElementById('editBookCover');
  coverEl.innerHTML = b.cover_url
    ? '<img class="book-cover" src="' + b.cover_url + '" alt="">'
    : '<div class="book-cover-placeholder">📖</div>';

  document.getElementById('editBookNote').value = b.note || '';
  selectEditMedium(b.medium || 'owned');
  selectEditStatus(b.status || 'done');
  selectEditStar(b.rating || 0);

  document.getElementById('bookEditModal').style.display = 'flex';
}

function closeBookEdit() {
  document.getElementById('bookEditModal').style.display = 'none';
}

function selectEditMedium(m) {
  document.querySelectorAll('[data-edit-medium]').forEach(function(btn) {
    btn.classList.toggle('selected', btn.dataset.editMedium === m);
  });
}

function selectEditStatus(s) {
  document.querySelectorAll('[data-edit-status]').forEach(function(btn) {
    btn.classList.toggle('selected', btn.dataset.editStatus === s);
  });
}

function selectEditStar(n) {
  editRating = n;
  document.querySelectorAll('[data-edit-star]').forEach(function(btn) {
    btn.classList.toggle('filled', parseInt(btn.dataset.editStar) <= n);
  });
}

function saveBookEdit() {
  var id = document.getElementById('editBookId').value;
  var note = document.getElementById('editBookNote').value.trim() || null;
  var status = 'done';
  var sel = document.querySelector('[data-edit-status].selected');
  if (sel) status = sel.dataset.editStatus;
  var medium = 'owned';
  var msel = document.querySelector('[data-edit-medium].selected');
  if (msel) medium = msel.dataset.editMedium;
  var rating = editRating || null;

  google.script.run
    .withSuccessHandler(function() {
      showToast('✅ 更新しました');
      closeBookEdit();
      loadRecentBooks();
    })
    .withFailureHandler(function(e) {
      showToast('エラー: ' + e.message);
    })
    .updateBook({ id: id, status: status, medium: medium, rating: rating, note: note });
}

function deleteBookAction() {
  var id = document.getElementById('editBookId').value;
  if (!confirm('この本を削除しますか？')) return;
  google.script.run
    .withSuccessHandler(function() {
      showToast('削除しました');
      closeBookEdit();
      loadRecentBooks();
    })
    .withFailureHandler(function(e) {
      showToast('エラー: ' + e.message);
    })
    .deleteBook(id);
}

// ==============================
// 音声入力
// ==============================
function toggleNoteVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('このブラウザは音声入力に対応していません');
    return;
  }
  if (isNoteRecording) { noteRecognition.stop(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  noteRecognition = new SR();
  noteRecognition.lang = 'ja-JP';
  noteRecognition.onstart = function() {
    isNoteRecording = true;
    document.getElementById('noteVoiceBtn').classList.add('recording');
  };
  noteRecognition.onresult = function(e) {
    document.getElementById('noteInput').value += e.results[0][0].transcript;
  };
  noteRecognition.onend = function() {
    isNoteRecording = false;
    document.getElementById('noteVoiceBtn').classList.remove('recording');
  };
  noteRecognition.start();
}

// ==============================
// Toast / Utility
// ==============================
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function escHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
