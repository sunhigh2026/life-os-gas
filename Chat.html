<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIチャット - Life OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #E8A0BF;
      --primary-light: #FFF0F5;
      --primary-dark: #957DAD;
      --primary-on: #FFFFFF;
      --text-main: #2D3B36;
      --text-sub: #7A9490;
      --bg: #fafafa;
      --bg-card: #FFFFFF;
      --accent: #957DAD;
      --border: #F0D6E4;
      --muted: #7A9490;
      --radius-card: 20px;
      --radius-btn: 14px;
      --max-w: 480px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    button:active { transform: scale(0.97); }

    .app-wrapper {
      max-width: var(--max-w);
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: 140px;
    }

    /* Character header */
    .chat-char-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-light), #fff);
      border-bottom: 1px solid var(--border);
    }
    .chat-pia-emoji {
      font-size: 48px;
      line-height: 1;
    }
    .chat-char-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-dark);
    }
    .chat-char-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* Quick buttons */
    .quick-btns {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      flex-wrap: wrap;
    }
    .quick-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--bg-card);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      transition: all 0.15s;
    }
    .quick-btn:hover {
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    /* Chat messages */
    .chat-messages {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      animation: fade-in 0.3s ease;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--primary);
      color: var(--primary-on);
      border-bottom-right-radius: 4px;
    }
    .message.ai {
      align-self: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .thinking {
      opacity: 0.6;
      font-style: italic;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* Input area */
    .chat-input-area {
      position: fixed;
      bottom: 72px;
      left: 0;
      right: 0;
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      align-items: center;
    }

    .chat-input-area input {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 10px 14px;
      background: var(--primary-light);
      color: var(--text-main);
      outline: none;
    }
    .chat-input-area input:focus { border-color: var(--primary); }

    .btn-voice {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--bg-card);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-voice.recording {
      background: #FC8A8A;
      border-color: #FC8A8A;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .btn-send {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--primary);
      color: var(--primary-on);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-send:active { background: var(--primary-dark); }

    /* Tab bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      z-index: 200;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 6px 0;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-sub);
      font-size: 10px;
      padding: 4px 12px;
      gap: 2px;
      transition: color 0.15s;
    }
    .tab-item.active { color: var(--primary-dark); }
    .tab-icon { display: flex; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 150px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .sheet-link {
      display: block;
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- ピアちゃんヘッダー -->
  <div class="chat-char-header" id="chatHeader">
    <span class="chat-pia-emoji">🐾</span>
    <div>
      <div class="chat-char-name" id="chatHeaderName">ピアちゃん</div>
      <div class="chat-char-sub">AIアシスタント 🐾</div>
    </div>
  </div>

  <!-- クイックボタン -->
  <div class="quick-btns">
    <button class="quick-btn" onclick="sendQuick('今日何やる？')">今日何やる？</button>
    <button class="quick-btn" onclick="sendQuick('最近の振り返りして')">振り返り</button>
    <button class="quick-btn" onclick="sendQuick('先月の読書量は？')">先月の読書</button>
    <button class="quick-btn" onclick="sendQuick('今の気分に合う本は？')">本のおすすめ</button>
    <button class="quick-btn" onclick="sendQuick('明日の予定は？')">明日の予定</button>
    <button class="quick-btn" onclick="sendQuick('mood傾向を分析して')">mood分析</button>
  </div>

  <!-- メッセージ一覧 -->
  <div class="chat-messages" id="chatMessages">
    <div class="message ai" id="greetingMsg">やっほ〜！ピアだよ🐾
なんでも聞いてね〜 日記・ToDo・読書のことを一緒に考えるよ！</div>
  </div>

</div>

<!-- 入力エリア -->
<div class="chat-input-area">
  <input type="text" id="chatInput" placeholder="メッセージを入力…"
         onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
  <button class="btn-voice" id="chatVoiceBtn" onclick="toggleChatVoice()" title="音声入力">🎤</button>
  <button class="btn-send" onclick="sendMessage()">➤</button>
</div>

<!-- タブバー -->
<nav class="tab-bar">
  <a href="?p=" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home
  </a>
  <a href="?p=books" class="tab-item">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>読書
  </a>
  <a href="?p=chat" class="tab-item active">
    <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Chat
  </a>
</nav>

<div id="toast"></div>

<script>
// ==============================
// 状態
// ==============================
var chatRecognition = null;
var isChatRecording = false;
var msgCounter = 0;

// ==============================
// 初期化
// ==============================
document.addEventListener('DOMContentLoaded', function() {
  initCharacter();
  // ホーム画面からの自動メッセージ
  var autoMsg = localStorage.getItem('chatAutoMsg');
  if (autoMsg) {
    localStorage.removeItem('chatAutoMsg');
    setTimeout(function() { sendQuick(autoMsg); }, 500);
  }
});

// ==============================
// キャラ設定読み込み
// ==============================
function initCharacter() {
  google.script.run.withSuccessHandler(function(settings) {
    if (settings['character_name']) {
      var nameEl = document.getElementById('chatHeaderName');
      if (nameEl) nameEl.textContent = settings['character_name'];
    }
  }).getSettings();
}

// ==============================
// メッセージ送信
// ==============================
function sendMessage() {
  var input = document.getElementById('chatInput');
  var message = input.value.trim();
  if (!message) return;

  input.value = '';
  appendMessage('user', message);
  scrollToBottom();

  var thinkingId = appendMessage('ai', '…考え中…', true);

  google.script.run
    .withSuccessHandler(function(data) {
      removeMessage(thinkingId);
      if (data.error) {
        appendMessage('ai', 'エラー: ' + data.error);
      } else {
        appendMessage('ai', data.reply || 'うまく答えられなかったよ…ごめんね！');
      }
      scrollToBottom();
    })
    .withFailureHandler(function(e) {
      removeMessage(thinkingId);
      appendMessage('ai', '通信エラー: ' + e.message);
      scrollToBottom();
    })
    .chat(message);
}

function sendQuick(msg) {
  document.getElementById('chatInput').value = msg;
  sendMessage();
}

// ==============================
// DOM操作
// ==============================
function appendMessage(role, text, isTemp) {
  var id = 'msg-' + (++msgCounter);
  var el = document.createElement('div');
  el.className = 'message ' + role + (isTemp ? ' thinking' : '');
  el.id = id;
  el.textContent = text;
  document.getElementById('chatMessages').appendChild(el);
  return id;
}

function removeMessage(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
}

function scrollToBottom() {
  var el = document.getElementById('chatMessages');
  el.scrollTop = el.scrollHeight;
}

// ==============================
// 音声入力
// ==============================
function toggleChatVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('このブラウザは音声入力に対応していません');
    return;
  }
  if (isChatRecording) { chatRecognition.stop(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  chatRecognition = new SR();
  chatRecognition.lang = 'ja-JP';
  chatRecognition.onstart = function() {
    isChatRecording = true;
    document.getElementById('chatVoiceBtn').classList.add('recording');
  };
  chatRecognition.onresult = function(e) {
    document.getElementById('chatInput').value += e.results[0][0].transcript;
  };
  chatRecognition.onend = function() {
    isChatRecording = false;
    document.getElementById('chatVoiceBtn').classList.remove('recording');
    sendMessage();
  };
  chatRecognition.start();
}

// ==============================
// Toast
// ==============================
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
}
</script>
</body>
</html>
